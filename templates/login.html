<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Iniciar sesión — Mi Copiadora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg, #185FA5 0%, #0F3D70 100%);
           display: flex; align-items: center; justify-content: center;
           font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 32px 28px;
            width: 100%; max-width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3); text-align: center; }
    .logo  { font-size: 48px; margin-bottom: 4px; }
    .title { font-size: 22px; font-weight: 800; color: #185FA5; }
    .sub   { font-size: 13px; color: #6B7280; margin-bottom: 22px; }
    .field { margin-bottom: 16px; text-align: left; }
    .field label { display: block; font-size: 13px; font-weight: 600;
                   color: #6B7280; margin-bottom: 5px; }
    .field input { width: 100%; padding: 12px 16px; font-size: 16px;
                   border: 2px solid #DDE3EE; border-radius: 12px;
                   outline: none; transition: border .2s; text-align: center; }
    .field input:focus { border-color: #185FA5; }
    .field input.err   { border-color: #E53E3E; }
    .pin-label { font-size: 13px; font-weight: 600; color: #6B7280;
                 display: block; margin-bottom: 8px; }
    .pin-dots  { display: flex; justify-content: center; gap: 12px; margin-bottom: 14px; }
    .dot { width: 18px; height: 18px; border-radius: 50%;
           border: 2.5px solid #185FA5; background: transparent; transition: background .15s; }
    .dot.on { background: #185FA5; }
    .keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .k { padding: 14px; border: 2px solid #DDE3EE; border-radius: 12px;
         background: #F8FAFF; font-size: 20px; font-weight: 700; color: #1A202C;
         cursor: pointer; transition: all .15s; user-select: none; }
    .k:active,.k:hover { background: #185FA5; color: #fff; border-color: #185FA5; }
    .k-del { background: #FFF0F0; border-color: #FFC0C0; color: #E53E3E; }
    .k-del:hover,.k-del:active { background: #E53E3E; color: #fff; border-color: #E53E3E; }
    .k-ok  { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .k-ok:hover,.k-ok:active { filter: brightness(1.1); }
    .error { background: #FFF0F0; border: 1px solid #FFC0C0; color: #9B1C1C;
             padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
    .hint  { font-size: 11px; color: #9CA3AF; margin-top: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🖨️</div>
  <div class="title">Mi Copiadora</div>
  <div class="sub">Ingresa tu usuario y PIN</div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" id="frm">
    <input type="hidden" name="pin"    id="h-pin">
    <input type="hidden" name="nombre" id="h-nombre">

    <div class="field">
      <label>Nombre de usuario</label>
      <input type="text" id="nombre" placeholder="Ej: Admin, Apoyo…"
             autocomplete="off" autocapitalize="words"
             value="{{ request.form.get('nombre', '') }}">
    </div>

    <label class="pin-label">PIN</label>
    <div class="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="keypad">
      <button type="button" class="k" onclick="add('1')">1</button>
      <button type="button" class="k" onclick="add('2')">2</button>
      <button type="button" class="k" onclick="add('3')">3</button>
      <button type="button" class="k" onclick="add('4')">4</button>
      <button type="button" class="k" onclick="add('5')">5</button>
      <button type="button" class="k" onclick="add('6')">6</button>
      <button type="button" class="k" onclick="add('7')">7</button>
      <button type="button" class="k" onclick="add('8')">8</button>
      <button type="button" class="k" onclick="add('9')">9</button>
      <button type="button" class="k k-del" onclick="del()">⌫</button>
      <button type="button" class="k" onclick="add('0')">0</button>
      <button type="button" class="k k-ok"  onclick="go()">✓</button>
    </div>

    <div class="hint">Admin → PIN 1234 &nbsp;|&nbsp; Apoyo → PIN 0000</div>
  </form>
</div>

<script>
  const dots = [0,1,2,3].map(i => document.getElementById('d'+i));
  let pin = '';

  function sync() { dots.forEach((d,i) => d.classList.toggle('on', i < pin.length)); }
  function add(d) { if (pin.length < 4) { pin += d; sync(); if (pin.length===4) go(); } }
  function del()  { pin = pin.slice(0,-1); sync(); }

  function go() {
    const nombre = document.getElementById('nombre').value.trim();
    if (!nombre) {
      document.getElementById('nombre').classList.add('err');
      document.getElementById('nombre').focus();
      pin = ''; sync();
      return;
    }
    if (pin.length < 4) return;
    document.getElementById('h-pin').value    = pin;
    document.getElementById('h-nombre').value = nombre;
    document.getElementById('frm').submit();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') add(e.key);
    else if (e.key === 'Backspace') del();
    else if (e.key === 'Enter') go();
  });

  document.getElementById('nombre').addEventListener('input', function() {
    this.classList.remove('err');
  });
</script>
</body>
</html>
