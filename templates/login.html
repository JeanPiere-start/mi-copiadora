<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Iniciar sesión — Mi Copiadora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(135deg, #185FA5 0%, #0F3D70 100%);
           display: flex; align-items: center; justify-content: center;
           font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }

    .login-card { background: #fff; border-radius: 20px;
                  padding: 36px 28px; width: 100%; max-width: 360px;
                  box-shadow: 0 20px 60px rgba(0,0,0,.3); text-align: center; }

    .login-logo { font-size: 52px; margin-bottom: 6px; }
    .login-title { font-size: 22px; font-weight: 800; color: #185FA5; }
    .login-sub   { font-size: 13px; color: #6B7280; margin-bottom: 24px; }

    .pin-display { display: flex; justify-content: center; gap: 12px;
                   margin-bottom: 20px; }
    .pin-dot { width: 18px; height: 18px; border-radius: 50%;
               border: 2.5px solid #185FA5; background: transparent;
               transition: background .15s; }
    .pin-dot.filled { background: #185FA5; }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
              margin-bottom: 18px; }
    .key { padding: 16px; border: 2px solid #DDE3EE; border-radius: 12px;
           background: #F8FAFF; font-size: 20px; font-weight: 700; color: #1A202C;
           cursor: pointer; transition: all .15s; user-select: none; }
    .key:active, .key:hover { background: #185FA5; color: #fff; border-color: #185FA5; }
    .key-del  { background: #FFF0F0; border-color: #FFC0C0; color: #E53E3E; }
    .key-del:hover, .key-del:active { background: #E53E3E; color: #fff; border-color: #E53E3E; }
    .key-ok   { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .key-ok:hover, .key-ok:active { filter: brightness(1.1); }

    .error-msg { background: #FFF0F0; border: 1px solid #FFC0C0; color: #9B1C1C;
                 padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }

    /* Hidden input */
    #pin-input { position: absolute; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">🖨️</div>
  <div class="login-title">Mi Copiadora</div>
  <div class="login-sub">Ingresa tu PIN de 4 dígitos</div>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <div class="pin-display">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>

  <form method="POST" id="login-form">
    <input type="password" id="pin-input" name="pin" maxlength="4" autocomplete="off">
    <div class="keypad">
      {% for n in [1,2,3,4,5,6,7,8,9] %}
      <button type="button" class="key" onclick="addDigit('{{ n }}')">{{ n }}</button>
      {% endfor %}
      <button type="button" class="key key-del" onclick="delDigit()">⌫</button>
      <button type="button" class="key" onclick="addDigit('0')">0</button>
      <button type="button" class="key key-ok" onclick="submitPin()">✓</button>
    </div>
  </form>
</div>

<script>
const input = document.getElementById('pin-input');
const dots  = [0,1,2,3].map(i => document.getElementById('d'+i));
let pin     = '';

function updateDots() {
  dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
}

function addDigit(d) {
  if (pin.length < 4) {
    pin += d;
    input.value = pin;
    updateDots();
    if (pin.length === 4) submitPin();
  }
}

function delDigit() {
  pin = pin.slice(0, -1);
  input.value = pin;
  updateDots();
}

function submitPin() {
  if (pin.length === 4) document.getElementById('login-form').submit();
}

// Teclado físico también
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') addDigit(e.key);
  else if (e.key === 'Backspace') delDigit();
  else if (e.key === 'Enter') submitPin();
});
</script>
</body>
</html>
